<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>Trening pamięci</title>

  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@1/css/pico.min.css">
</head>

<body>

<nav class="container-fluid">
  <ul>
    <li><strong>Trening Pamięci</strong></li>
  </ul>

  <ul>
    <li><a href="#">Test</a></li>
    <li><a href="#">Statystyki</a></li>
    <li><a href="#" role="button">Start</a></li>
  </ul>
</nav>

<main class="container">

  <div class="grid">
    <section>

      <div class="card">

        <!-- START -->
        <div id="startScreen">

          <hgroup>
            <h2>Test pamięci</h2>
            <h3>Podaj swój wiek</h3>
          </hgroup>

          <input
            type="number"
            id="ageInput"
            placeholder="Ile masz lat?"
            min="1"
            max="120"
          >

          <button id="startBtn">
            Rozpocznij test
          </button>

        </div>

        <!-- GRA -->
        <div id="gameScreen" class="hidden">

          <hgroup>
            <h2>Zapamiętaj liczbę</h2>
            <h3>Masz jedną próbę</h3>
          </hgroup>

          <div id="number" class="number"></div>

          <button id="rememberBtn">
            Zapamiętałem
          </button>

          <div id="game" class="hidden">

            <p>Wpisz liczbę:</p>

            <div id="answer" class="answer"></div>

            <div id="keypad" class="keypad"></div>

          </div>

          <div id="feedback" class="feedback"></div>

          <div id="result" class="result"></div>

        </div>

      </div>

    </section>
  </div>

</main>

<!-- PANEL ADMINA -->
<section class="container">

  <article>

    <h2>Panel administratora</h2>

    <input
      type="password"
      id="adminPassword"
      placeholder="Hasło administratora"
    >

    <button id="adminLoginBtn">
      Zaloguj
    </button>

    <div id="adminPanel" class="hidden">

      <h3>Wyniki użytkowników</h3>

      <table>
        <thead>
          <tr>
            <th>Wiek</th>
            <th>Poprawne</th>
            <th>Wynik %</th>
          </tr>
        </thead>

        <tbody id="adminTable"></tbody>
      </table>

      <h3>Grupy wiekowe</h3>

      <div id="ageStats"></div>

    </div>

  </article>

</section>

<footer class="container">
  <small>
    <a href="#">Memory App</a> •
    <a href="#">2026</a>
  </small>
</footer>

<script src="script.js"></script>

</body>
</html>
